<body>
<style>
    /* Estilos para el splash screen */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('faristol_splash.jpg'); /* Ruta a tu imagen */
      background-size: cover; /* Asegura que la imagen cubra todo */
      background-position: center; /* Centra la imagen */
      z-index: 9999; /* Mantiene el splash screen por encima de otros elementos */
      opacity: 1; /* Opacidad inicial */
      transition: opacity 3s ease 0s; /* Transición para el efecto de desvanecimiento */
    }
    #title {
      opacity: 0; /* Opacidad inicial */
      transition: opacity 2s ease 0s; /* Transición para el efecto de desvanecimiento */
    }
</style>
<div id="splash-screen"></div>
<script>
    window.addEventListener('load', function(ev) {
      // Oculta el splash screen cuando la página ha cargado
      const splashScreen = document.getElementById('splash-screen');
      const title = document.getElementById('title');
      title.style.opacity = 1;
      setTimeout(() => {
        splashScreen.style.opacity = 0;
        title.style.opacity = 0;
        setTimeout(() => {
          splashScreen.style.display = 'none';
          title.style.display = 'none';
        }, 2500); // Asegúrate de que coincide con el tiempo de la transición en CSS
      }, 1000); // Asegúrate de que coincide con el tiempo de la transición en CSS
    });
</script>
  <h1 id="title">Faristol - Plataforma de Partituras para Músicos y Compositores</h1>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/build/pdf.js" type="text/javascript"></script>
  <script type="text/javascript">
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/build/pdf.worker.min.js";
    pdfRenderOptions = {
      cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/cmaps/',
      cMapPacked: true,
    }
  </script>
  <script>
    window.addEventListener('load', function (ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine().then(function (appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
