<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="website">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Faristol</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = '"1408269081"';
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js?v=1729216697"></script>
</head>

<body>
  <style>
    /* Estilos para el splash screen */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('faristol_splash.jpg');
      /* Ruta a tu imagen */
      background-size: cover;
      /* Asegura que la imagen cubra todo */
      background-position: center;
      /* Centra la imagen */
      z-index: 9999;
      /* Mantiene el splash screen por encima de otros elementos */
      transition: opacity 1s ease;
      /* Transición para el efecto de desvanecimiento */
      opacity: 1;
      /* Opacidad inicial */
    }

    .fade-out {
      opacity: 0;
      /* Opacidad al desvanecer */
    }
  </style>
  <div id="splash-screen"></div>
  <script>
    window.addEventListener('load', function (ev) {
      // Oculta el splash screen cuando la página ha cargado
      const splashScreen = document.getElementById('splash-screen');
      splashScreen.classList.add('fade-out');
      setTimeout(() => {
        splashScreen.style.display = 'none';
      }, 1000); // Asegúrate de que coincide con el tiempo de la transición en CSS
    });
    // Llamada para descargar main.dart.js después de que el splash screen se ha ocultado
    _flutter.loader.loadEntrypoint({
      serviceWorker: {
        serviceWorkerVersion: serviceWorkerVersion,
      },
      onEntrypointLoaded: function (engineInitializer) {
        engineInitializer.initializeEngine().then(function (appRunner) {
          appRunner.runApp();
        });
      }
    });

  </script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/build/pdf.js" type="text/javascript"></script>
  <script type="text/javascript">
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/build/pdf.worker.min.js";
    pdfRenderOptions = {
      cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/cmaps/',
      cMapPacked: true,
    }
  </script>
</body>

</html>
